<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join OpenNearMe</title>
    <meta name="description" content="Create your free OpenNearMe account.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#f0fdf4', 500: '#10b981', 600: '#059669' },
                        warm: { 50: '#fafaf9', 800: '#1c1917', 900: '#0c0a09' }
                    }
                }
            }
        }
    </script>
    <style>
        .role-card { transition: all 0.3s ease; cursor: pointer; }
        .role-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .role-card.selected { border-color: #10b981; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-warm-50 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-warm-900">
                    <i data-lucide="moon" class="w-8 h-8 text-primary-500"></i>
                    <span>OpenNearMe</span>
                </a>
                <a href="index.html" class="text-warm-800 hover:text-primary-500 transition flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
                </a>
            </div>
        </nav>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-warm-900 mb-2">Join Our Community 🌱</h1>
                <p class="text-gray-600">Create your account and start discovering places that welcome you.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-8">
                <div class="space-y-3 mb-6">
                    <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-xl hover:bg-gray-50 transition">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="font-medium text-gray-700">Continue with Google</span>
                    </button>
                    <button class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-[#1877F2] text-white rounded-xl hover:bg-[#166FE5] transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span class="font-medium">Continue with Facebook</span>
                    </button>
                </div>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">or register with email</span></div>
                </div>

                <form class="space-y-4" id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="email" id="email" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500" placeholder="your@email.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="password" id="password" required minlength="8" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500" placeholder="At least 8 characters">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="password" id="confirmPassword" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500" placeholder="Repeat your password">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-3">I am a <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="role-card border-2 border-gray-300 rounded-xl p-4 text-center" onclick="selectRole('user', this)">
                                <i data-lucide="user" class="w-8 h-8 mx-auto mb-2 text-gray-600"></i>
                                <h3 class="font-semibold text-gray-800">User</h3>
                                <p class="text-xs text-gray-500 mt-1">Browse places</p>
                            </div>
                            <div class="role-card border-2 border-gray-300 rounded-xl p-4 text-center" onclick="selectRole('owner', this)">
                                <i data-lucide="store" class="w-8 h-8 mx-auto mb-2 text-gray-600"></i>
                                <h3 class="font-semibold text-gray-800">Business Owner</h3>
                                <p class="text-xs text-gray-500 mt-1">Add my place</p>
                            </div>
                        </div>
                        <input type="hidden" id="role" name="role" required>
                    </div>
                    <div class="flex items-start">
                        <input type="checkbox" id="terms" required class="w-4 h-4 text-primary-500 border-gray-300 rounded focus:ring-primary-500 mt-1">
                        <label for="terms" class="ml-2 text-sm text-gray-700">I agree to the Terms of Service and Privacy Policy</label>
                    </div>
                    <button type="submit" class="w-full bg-primary-500 text-white py-3 rounded-xl font-semibold hover:bg-primary-600 transition shadow-lg">Create Account</button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">Already have an account? <a href="login.html" class="text-primary-500 hover:text-primary-600 font-semibold">Sign In</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        function selectRole(role, element) {
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('role').value = role;
        }
        function handleRegister() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            if (password !== confirmPassword) { alert('Passwords do not match.'); return; }
            if (!role) { alert('Please select a role.'); return; }
            alert('Registration successful! Welcome to OpenNearMe 🌙');
        }
    </script>
</body>
</html>
